<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07071a">
<title>Pirate's Cove Glow Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07071a;
    --bg-2: #0c0b24;
    --teal: #00f0d0;
    --purple: #b14fff;
    --gold: #ffd34d;
    --pink: #ff5ad0;
    --text: #eef0ff;
    --muted: #8b93c8;
    --display: 'Pirata One', cursive;
    --body: 'Outfit', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    font-family: var(--body);
    color: var(--text);
    background:
      radial-gradient(circle at 20% 15%, rgba(177,79,255,0.12), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(0,240,208,0.09), transparent 45%),
      radial-gradient(circle at 50% 50%, #0c0b24, #07071a 70%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* subtle drifting blacklight specks */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 12% 22%, rgba(0,240,208,0.5), transparent),
      radial-gradient(1.5px 1.5px at 78% 18%, rgba(255,90,208,0.5), transparent),
      radial-gradient(1px 1px at 35% 70%, rgba(177,79,255,0.5), transparent),
      radial-gradient(1px 1px at 65% 60%, rgba(255,211,77,0.45), transparent),
      radial-gradient(1.5px 1.5px at 88% 78%, rgba(0,240,208,0.4), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .screen { display: none; flex: 1; flex-direction: column; position: relative; z-index: 1; }
  .screen.active { display: flex; }

  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
  }

  .card {
    width: 100%;
    max-width: 520px;
    text-align: center;
    padding: 1rem;
  }

  /* ---- Title ---- */
  .title-wrap { margin-bottom: 2rem; }

  .title {
    font-family: var(--display);
    line-height: 0.92;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .title .l1 {
    display: block;
    font-size: clamp(3rem, 13vw, 5.5rem);
    color: var(--teal);
    text-shadow:
      0 0 2px rgba(0,240,208,0.8),
      0 0 10px rgba(0,240,208,0.4);
    animation: flicker 6s infinite;
  }

  .title .l2 {
    display: block;
    font-size: clamp(2.4rem, 10.5vw, 4.6rem);
    color: var(--pink);
    text-shadow:
      0 0 2px rgba(255,90,208,0.8),
      0 0 10px rgba(255,90,208,0.4);
    margin-top: 0.1em;
    animation: flicker 7s infinite 0.4s;
  }

  @keyframes flicker {
    0%, 92%, 100% { opacity: 1; }
    93% { opacity: 0.72; }
    94% { opacity: 1; }
    96% { opacity: 0.85; }
    97% { opacity: 1; }
  }

  .skull {
    font-size: 2.2rem;
    display: block;
    margin-bottom: 0.6rem;
    filter: drop-shadow(0 0 5px rgba(255,211,77,0.45));
  }

  .blurb {
    font-size: 1.02rem;
    font-weight: 300;
    line-height: 1.65;
    color: var(--text);
    max-width: 26rem;
    margin: 0 auto 2.2rem;
  }
  .blurb strong { font-weight: 600; color: var(--gold); }

  /* ---- Play button ---- */
  .btn-play {
    font-family: var(--body);
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #04231f;
    background: var(--teal);
    border: none;
    border-radius: 999px;
    padding: 1rem 3.4rem;
    cursor: pointer;
    box-shadow:
      0 0 8px rgba(0,240,208,0.5),
      0 0 20px rgba(0,240,208,0.25);
    transition: transform 0.12s ease, box-shadow 0.2s ease;
  }
  .btn-play:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 0 12px rgba(0,240,208,0.65), 0 0 28px rgba(0,240,208,0.35);
  }
  .btn-play:active { transform: scale(0.97); }

  /* ---- Footer logo slot ---- */
  .footer {
    text-align: center;
    padding: 1.5rem 1rem 2rem;
    position: relative;
    z-index: 1;
  }
  .logo-slot {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0.85;
  }
  .logo-placeholder {
    border: 1px dashed rgba(139,147,200,0.5);
    border-radius: 10px;
    padding: 10px 22px;
    color: var(--muted);
    font-size: 0.72rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .footer .biz {
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  @media (prefers-reduced-motion: reduce) {
    .title .l1, .title .l2 { animation: none; }
  }
</style>
</head>
<body>

<!-- ============ SCREEN 1: WELCOME ============ -->
<section id="screen-welcome" class="screen active">
  <div class="stage">
    <div class="card">
      <div class="title-wrap">
        <span class="skull">&#9760;</span>
        <h1 class="title">
          <span class="l1">Pirate's Cove</span>
          <span class="l2">Glow Golf</span>
        </h1>
      </div>

      <p class="blurb">
        <strong>Welcome to Pirate's Cove Glow Golf!</strong>
        Grab your putter and set sail through 18 holes of glowing, blacklit
        adventure. Dodge the traps, sink your putts, and see who rules the
        course. Play fair, glow bright, and may the best pirate win!
      </p>

      <button class="btn-play" onclick="goToRules()">Play</button>
    </div>
  </div>

  <footer class="footer">
    <div class="logo-slot">
      <div class="logo-placeholder">Logo coming soon</div>
      <div class="biz">Big Apple Fun Center</div>
    </div>
  </footer>
</section>

<!-- Future screens (rules, setup, scoring, scorecard) will be added here -->

<script>
  function goToRules() {
    // Placeholder until the Course Rules screen is built next.
    alert("Next up: Course Rules screen (we'll build it next).");
  }
</script>

</body>
</html>
