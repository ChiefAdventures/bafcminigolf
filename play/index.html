<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07071a">
<title>Scoring — Big Apple Glow Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<main class="stage">
  <div class="card">
    <p class="play-eyebrow">Big Apple Glow Golf</p>

    <div class="hole-head">
      <div class="block">
        <span class="k">Hole</span>
        <span class="big" id="hole-num">1</span>
      </div>
      <div class="block">
        <span class="k">Par</span>
        <span class="big par" id="hole-par">3</span>
      </div>
      <div class="block">
        <span class="k">of</span>
        <span class="big" id="hole-total">18</span>
      </div>
    </div>

    <div class="progress"><div class="bar" id="progress-bar"></div></div>

    <p class="tee-label">Tee order</p>
    <div class="score-list" id="score-list"></div>

    <div class="demo-bar" id="demo-bar" hidden>
      <span class="demo-tag">Demo mode</span>
      <button class="demo-btn" id="demo-fill" type="button">Fill hole</button>
      <button class="demo-btn" id="demo-skip" type="button">Skip to results</button>
    </div>

    <div class="nav-row" id="nav-row"></div>
  </div>
</main>

<footer class="footer">
  <div class="logo-badge">
    <img class="logo-img" src="../img/big-apple-logo.png" alt="Big Apple Fun Center — Kearney, NE">
  </div>
</footer>

<script src="../js/app.js"></script>
<script>
  var params = new URLSearchParams(window.location.search);
  var isDemo = params.has("demo");

  var DEMO_NAMES = ["Blackbeard", "Anne Bonny", "Long John", "Calico Jack"];

  function makeDemoState() {
    var st = PCGG.blankState();
    st.demo = true;
    st.players = DEMO_NAMES.map(function (nm, i) {
      return {
        name: nm,
        color: PCGG.COLORS[i].hex,
        colorName: PCGG.COLORS[i].name,
        colorGlow: PCGG.COLORS[i].glow,
        scores: new Array(PCGG.TOTAL_HOLES).fill(0)
      };
    });
    st.teeOrder = st.players.map(function (_, i) { return i; });
    st.currentHole = 1;
    return st;
  }

  var state;
  if (isDemo) {
    // Loading the demo URL always starts a fresh demo round.
    state = makeDemoState();
    PCGG.saveState(state);
  } else {
    state = PCGG.loadState();
  }

  var demoMode = !!state.demo;

  // Safety: if there are no players, go back to setup.
  if (!state.players || state.players.length === 0) {
    window.location.href = "../setup/";
  }

  // weighted random stroke, biased toward 2-4 (realistic)
  function randomStroke() {
    var pool = [1, 2, 2, 3, 3, 3, 4, 4, 5, 6];
    return pool[Math.floor(Math.random() * pool.length)];
  }

  var TOTAL = PCGG.TOTAL_HOLES;
  var MAX_STROKES = 6;

  var holeNumEl = document.getElementById("hole-num");
  var holeParEl = document.getElementById("hole-par");
  var holeTotalEl = document.getElementById("hole-total");
  var progressEl = document.getElementById("progress-bar");
  var listEl = document.getElementById("score-list");
  var navEl = document.getElementById("nav-row");

  function holeIndex() { return state.currentHole - 1; }

  function allScored() {
    var h = holeIndex();
    return state.players.every(function (p) { return p.scores[h] > 0; });
  }

  function ordinal(n) {
    var s = ["th", "st", "nd", "rd"], v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  function render() {
    var h = holeIndex();
    holeNumEl.textContent = state.currentHole;
    holeParEl.textContent = state.par;
    holeTotalEl.textContent = TOTAL;
    progressEl.style.width = Math.round((state.currentHole / TOTAL) * 100) + "%";

    var order = PCGG.teeOrderForHole(state, h);

    listEl.innerHTML = "";
    order.forEach(function (pi, pos) {
      var p = state.players[pi];

      var card = document.createElement("div");
      card.className = "score-player";
      card.style.setProperty("--dot", p.color);
      card.style.setProperty("--dot-glow", p.colorGlow);

      var who = document.createElement("div");
      who.className = "who";
      who.innerHTML =
        '<span class="rank">' + ordinal(pos + 1) + '</span>' +
        '<span class="pname"></span>';
      var nameEl = who.querySelector(".pname");
      nameEl.textContent = p.name;
      nameEl.style.color = p.color;
      nameEl.style.textShadow = "0 0 8px " + p.colorGlow;
      card.appendChild(who);

      var grid = document.createElement("div");
      grid.className = "stroke-grid";
      for (var s = 1; s <= MAX_STROKES; s++) {
        (function (strokeVal) {
          var b = document.createElement("button");
          b.className = "stroke-btn" + (p.scores[h] === strokeVal ? " selected" : "");
          b.type = "button";
          b.textContent = strokeVal;
          b.setAttribute("aria-label", p.name + ": " + strokeVal + " strokes");
          b.addEventListener("click", function () {
            state.players[pi].scores[h] = strokeVal;
            PCGG.saveState(state);
            // update just this row's button highlights + nav lock
            grid.querySelectorAll(".stroke-btn").forEach(function (btn, idx) {
              btn.classList.toggle("selected", idx + 1 === strokeVal);
            });
            updateNavLock();
          });
          grid.appendChild(b);
        })(s);
      }
      card.appendChild(grid);
      listEl.appendChild(card);
    });

    renderNav();
  }

  function renderNav() {
    navEl.innerHTML = "";
    var isFirst = state.currentHole === 1;
    var isLast = state.currentHole === TOTAL;

    if (!isFirst) {
      var prev = document.createElement("button");
      prev.className = "btn-prev";
      prev.type = "button";
      prev.textContent = "\u2190 Previous Hole";
      prev.addEventListener("click", function () {
        state.currentHole--;
        PCGG.saveState(state);
        render();
        window.scrollTo(0, 0);
      });
      navEl.appendChild(prev);
    }

    var next = document.createElement("button");
    next.className = "btn-primary";
    next.type = "button";
    next.id = "next-btn";
    next.textContent = isLast ? "Finish Round" : "Next Hole \u2192";
    next.addEventListener("click", function () {
      if (!allScored()) return;
      if (isLast) {
        PCGG.saveState(state);
        window.location.href = "../scorecard/";
      } else {
        state.currentHole++;
        PCGG.saveState(state);
        render();
        window.scrollTo(0, 0);
      }
    });
    navEl.appendChild(next);

    updateNavLock();
  }

  function updateNavLock() {
    var next = document.getElementById("next-btn");
    if (!next) return;
    var ok = allScored();
    next.disabled = !ok;
    next.classList.toggle("is-disabled", !ok);
  }

  // ---- Demo mode controls ----
  if (demoMode) {
    var bar = document.getElementById("demo-bar");
    bar.hidden = false;

    document.getElementById("demo-fill").addEventListener("click", function () {
      var h = holeIndex();
      state.players.forEach(function (p) { p.scores[h] = randomStroke(); });
      PCGG.saveState(state);
      render();
      window.scrollTo(0, 0);
    });

    document.getElementById("demo-skip").addEventListener("click", function () {
      for (var h = holeIndex(); h < TOTAL; h++) {
        state.players.forEach(function (p) {
          if (p.scores[h] === 0) p.scores[h] = randomStroke();
        });
      }
      state.currentHole = TOTAL;
      PCGG.saveState(state);
      window.location.href = "../scorecard/";
    });
  }

  render();
</script>
</body>
</html>
